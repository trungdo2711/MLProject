<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phát Hiện URL Lừa Đảo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>🛡️ AI Phát Hiện URL Lừa Đảo</h1>
            <p class="subtitle">
                Kiểm tra độ an toàn của website bằng AI
            </p>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Nhập URL cần kiểm tra...">
                <button onclick="checkURL()">
                    Kiểm Tra
                </button>
            </div>

            <div id="loading" class="loading hidden">
                ⏳ Đang phân tích...
            </div>

            <div id="result" class="result hidden">
                <h2>Kết quả</h2>

                <div class="result-item">
                    <span>Phán quyết:</span>
                    <span id="label"></span>
                </div>

                <div class="result-item">
                    <span>Độ tin cậy:</span>
                    <span id="prob"></span>
                </div>

                <div class="result-item">
                    <span>Nguồn:</span>
                    <span id="source"></span>
                </div>

                <div class="result-item">
                    <span>Lý do:</span>
                    <span id="reason"></span>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function checkURL() {

            const url = document.getElementById("urlInput").value;

            const resultBox = document.getElementById("result");
            const loading = document.getElementById("loading");

            loading.classList.remove("hidden");
            resultBox.classList.add("hidden");

            try {

                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: url
                    })
                });

                const result = await response.json();

                loading.classList.add("hidden");

                document.getElementById("label").innerHTML =
                    result.label === "safe"
                        ? "✅ SAFE"
                        : "🚨 DANGEROUS";

                document.getElementById("prob").innerHTML =
                    (result.prob * 100).toFixed(2) + "%";

                document.getElementById("source").innerHTML =
                    result.source || "-";

                document.getElementById("reason").innerHTML =
                    result.reason || "-";

                resultBox.classList.remove("hidden");

            } catch (err) {

                loading.classList.add("hidden");

                alert("Lỗi: " + err);

            }
        }
    </script>

</body>

</html>
